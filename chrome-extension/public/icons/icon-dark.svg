<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="crownDarkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A; stop-opacity:1"/> <!-- Medium Blue -->
      <stop offset="100%" style="stop-color:#0D255A; stop-opacity:1"/> <!-- Dark Blue -->
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Basic 3-point crown shape -->
  <!-- Points: (4,15) (16,6) (28,15) -->
  <!-- Base: (4,15) to (28,15) then curves down for the band -->
  <path d="M4,15 L16,6 L28,15 L27,26 H5 L4,15 Z" 
        fill="url(#crownDarkGradient)" 
        stroke="#0B1A3D" 
        stroke-width="1" 
        stroke-linejoin="round"/>
  
  <!-- Gemstones - light colored for contrast -->
  <circle cx="16" cy="8" r="2" fill="#E0F7FA" stroke="#B0E0E6" stroke-width="0.5" filter="url(#glow)"/> <!-- Top point gemstone (light cyan/white) -->
  <circle cx="7" cy="16" r="1.5" fill="#E0F7FA" stroke="#B0E0E6" stroke-width="0.5" filter="url(#glow)"/> <!-- Left point gemstone -->
  <circle cx="25" cy="16" r="1.5" fill="#E0F7FA" stroke="#B0E0E6" stroke-width="0.5" filter="url(#glow)"/> <!-- Right point gemstone -->

  <!-- Optional subtle highlights on the crown body if needed, but gradient should do most work -->
   <path d="M16,7 L18,13 L14,13 Z" fill="#2B4A9A" opacity="0.5"/> <!-- Highlight on central tine -->

</svg>
